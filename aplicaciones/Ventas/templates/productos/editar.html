{% extends 'base.html' %}
{% block titulo %}Editar Producto{% endblock %}

{% block contenido %}
<div class="container-fluid">
  <div class="card w-100 h-100 position-relative overflow-hidden">
    <div class="container d-flex justify-content-center mt-5">
      <div class="card shadow-sm w-75">
        <div class="card-header text-white text-center" style="background:#ffc107;">
          <h3 class="mb-0">Editar Producto</h3>
        </div>

        <div class="card-body">
          <form action="{% url 'producto_actualizar' producto.id %}" method="post">
            {% csrf_token %}

            <div class="mb-3">
              <label for="txt_codigo" class="form-label"><b>Código de barras</b></label>
              <input type="text" name="txt_codigo" id="txt_codigo"
                     class="form-control" maxlength="64" required
                     value="{{ producto.codigo_barras }}">
            </div>

            <div class="mb-3">
              <label for="txt_nombre" class="form-label"><b>Nombre</b></label>
              <input type="text" name="txt_nombre" id="txt_nombre"
                     class="form-control" maxlength="200" required
                     value="{{ producto.nombre }}">
            </div>

            <div class="mb-3">
              <label for="txt_precio" class="form-label"><b>Precio</b></label>
              <input type="number" name="txt_precio" id="txt_precio"
                     class="form-control" min="0" step="0.01" required
                     value="{{ producto.precio }}">
            </div>

            <div class="mb-3">
              <label for="txt_cantidad" class="form-label"><b>Stock</b></label>
              <input type="number" name="txt_cantidad" id="txt_cantidad"
                     class="form-control" min="0" step="0.01" required
                     value="{{ producto.stock }}">
            </div>

            <div class="form-check mb-3">
              <input class="form-check-input" type="checkbox" value="1" id="chk_activo" name="chk_activo"
                     {% if producto.activo %}checked{% endif %}>
              <label class="form-check-label" for="chk_activo">Activo</label>
            </div>

            <div class="d-flex justify-content-center gap-3 mt-4">
              <button type="submit" class="btn btn-success px-4">Guardar Cambios</button>
              <a href="{% url 'productos_lista' %}" class="btn btn-secondary px-4">Cancelar</a>
            </div>

          </form>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
